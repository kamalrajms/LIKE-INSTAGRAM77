        crossorigin="anonymous" referrerpolicy="no-referrer" />

        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<body>
    
<a href="./index.html">Back</a>
    <section>
        <div class="sectiom-top">
            <img src="./PHOTO1/stackly_logo_transparent.webp" alt="">
            <h3>Sign up to Social Media</h3>
        </div>
        <form action="./error.html" class="section-bot">
            <div class="signin-field">
                <label>Full Name</label>
                <input type="text" required>
            </div>
            <div class="signin-field">
                <label>Email</label>
                <input type="email" required>
            </div>
            <div class="signin-field">
                <label>Password</label>
                <input type="password" required>
            </div>
            <div class="signin-rem">
                <nav>
                    <input type="checkbox" id="kkk" required>
                    <label for="kkk">I certify that I am 18 years of age or older, and agree to the <p>User Agreement</p>
                        and
                        <p> Privacy Policy.</p>
                    </label>
                </nav>
                <!-- <p>Forgot Password?</p> -->
            </div>
            <button class="signup-btn">Sign Up</button>

            <h3>
                <a href="./login.html" class="signin-link">Sign In</a>
                into your account
            </h3>
            <!-- <p>Don't have an account? <label for="">Sign up</label></p> -->
        </form>

    </section>



    <script>
        AOS.init({
            duration: 400,
            easing: 'ease-in-out',
            once: true,
        });

    </script>
</body>

</html>
